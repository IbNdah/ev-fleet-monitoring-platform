version: 2

updates:
  # Root Python project
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Cloud Connector
  - package-ecosystem: "pip"
    directory: "/cloud"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Azure Functions
  - package-ecosystem: "pip"
    directory: "/cloud/functions_app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "github-actions"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/infrastructure/environments/dev"
    schedule:
      interval: "weekly"
    labels:
      - "terraform"
